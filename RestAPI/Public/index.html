<script> src="dist/index.js"

async function getData(url)
{
	const response = await fetch(url);
	return await response.json();
}

async function testAPI()
{
	//let u = "Group4API/";
	//let ttable = parseInt (document.getElementById("whichTable").value, 10);
	//if (ttable < 1)
		//ttable = 1;
	//u = u + ttable.toString();

	//let j = await getData(u);
	let start=document.getElementById("startTime").value
	let end=document.getElementById("endTime").value

	//document.getElementById("showData").innerHTML = j;
	

	let k = await getData(`http://10.192.144.9:4000/partcount?start=${start}&end=${end}`);
	console.log(k);

	document.getElementById("output").innerText=k.total_count;

	let l = await getData(`http://10.192.144.9:4000/cycletime?start=${start}&end=${end}`);
    console.log(l);
    //document.getElementById("cycleTime").innerText=l.result;

	const tableBody = document.getElementById("cycleTable");
	 
	l.result.forEach((value, index) => {
		const row = document.createElement("tr");

		const col1 = document.createElement("td");
		col1.textContent = value.serverTimeStamp.toString();

		const col2 = document.createElement("td");
		col2.textContent = value.timeDiff.toString();

		row.appendChild(col1);
		row.appendChild(col2);
		tableBody.appendChild(row);
  	});

	let j = await getData(`http://10.192.144.9:4000/toque?start=${start}&end=${end}`);
	j.result.forEach((value, index) => {
		const row = document.createElement("tr");

		const col1 = document.createElement("td");
		col1.textContent = value.torque.toString();

		row.appendChild(col1);
		
		tableBody.appendChild(row);
  	});

}
</script>
